name: Compile Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    - name: Compile Release APK
      run: ./gradlew assembleRelease

    - name: Rename Output Binary
      run: |
        mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/android-15.apk 2>/dev/null || \
        mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/android-15.apk

    - name: Upload Compiled APK
      uses: actions/upload-artifact@v4
      with:
        name: android-15-binary
        path: app/build/outputs/apk/release/android-15.apk
