name: Compile Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Compile Debug APK
      run: gradle assembleDebug

    - name: Rename Output Binary
      run: |
        mkdir -p app/build/outputs/apk/custom/
        find app/build/outputs/apk/ -name "*.apk" -exec mv {} app/build/outputs/apk/custom/android-15.apk \;

    - name: Upload Compiled APK
      uses: actions/upload-artifact@v4
      with:
        name: android-15-binary
        path: app/build/outputs/apk/custom/android-15.apk
