name: Compile Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Generate Dummy Keys and Google Config
      run: |
        touch .env
        touch .env.example
        
        # 1. Generate the missing mock keystores required by your app/build.gradle.kts
        keytool -genkey -v -keystore my-upload-key.jks -alias upload -keyalg RSA -keysize 2048 -validity 10000 -storepass "android" -keypass "android" -dname "CN=Mock, O=Mock, C=US"
        keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass "android" -keypass "android" -dname "CN=Mock, O=Mock, C=US"
        
        # 2. Inject a valid mock structure to satisfy the Google Services plugin parsing requirements
        cat << 'EOF' > app/google-services.json
        {
          "project_info": {
            "project_number": "123456789012",
            "project_id": "mock-project-id",
            "storage_bucket": "mock-project-id.appspot.com"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:123456789012:android:mockapp123456",
                "android_client_info": {
                  "package_name": "com.aistudio.syshud.gbytw"
                }
              },
              "oauth_client": [],
              "api_key": [
                {
                  "current_key": "mock_api_key_for_github_compilation_pass"
                }
              ],
              "services": {
                "appinvite_service": {
                  "status": 1
                }
              }
            }
          ],
          "configuration_version": "1"
        }
        EOF

    - name: Compile Application Binary
      env:
        STORE_PASSWORD: "android"
        KEY_PASSWORD: "android"
      run: gradle assembleRelease

    - name: Pack Output Artifact
      run: |
        mkdir -p app/build/outputs/apk/custom/
        find app/build/outputs/apk/ -name "*.apk" -exec mv {} app/build/outputs/apk/custom/android-15.apk \;

    - name: Upload Compiled APK
      uses: actions/upload-artifact@v4
      with:
        name: android-15-binary
        path: app/build/outputs/apk/custom/android-15.apk
